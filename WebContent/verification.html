<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RecipeShare - Email Verification</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-light">
    <div id="navbar-container"></div>

    <main class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card shadow border-0">
                    <div class="card-body p-5 text-center">
                        <div id="status-icon" class="display-4 mb-3"></div>
                        <h1 id="status-title" class="fw-bold mb-3">Email Verification</h1>
                        <p id="status-message" class="text-muted mb-4"></p>
                        <div class="d-flex justify-content-center gap-3">
                            <a id="primary-link" href="login.html" class="btn btn-primary">
                                <i class="bi bi-box-arrow-in-right"></i> Log In
                            </a>
                            <a href="index.html" class="btn btn-outline-secondary">
                                <i class="bi bi-house"></i> Go Home
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        (function() {
            const params = new URLSearchParams(window.location.search);
            const status = params.get('status') || 'error';
            const rawMessage = params.get('message') || 'Verification failed. The link may be invalid or expired.';
            const message = decodeURIComponent(rawMessage.replace(/\+/g, '%20'));

            const icon = document.getElementById('status-icon');
            const title = document.getElementById('status-title');
            const text = document.getElementById('status-message');
            const primaryLink = document.getElementById('primary-link');

            if (status === 'success') {
                icon.innerHTML = '<i class="bi bi-check-circle text-success"></i>';
                title.textContent = 'Email verified!';
                text.textContent = message;
                primaryLink.innerHTML = '<i class="bi bi-box-arrow-in-right"></i> Log In';
                primaryLink.href = 'login.html';
            } else {
                icon.innerHTML = '<i class="bi bi-exclamation-triangle text-warning"></i>';
                title.textContent = 'Verification failed';
                text.textContent = message;
                primaryLink.innerHTML = '<i class="bi bi-envelope"></i> Resend Link';
                primaryLink.href = 'register.html';
            }
        })();
    </script>
    <script src="js/footer.js"></script>
    <script src="js/navbar.js"></script>
</body>
</html>
