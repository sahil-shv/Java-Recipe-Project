<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RecipeShare - Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div id="navbar-container"></div>

    <main class="container my-5">
        <div class="row">
            <div class="col-lg-8 mx-auto text-center">
                <h1 class="display-4 fw-bold text-primary mb-4">🍳 Welcome to RecipeShare</h1>
                <p class="lead text-muted mb-5">Share your favorite dishes, discover new flavors, and connect with food lovers everywhere.</p>
                
                <div id="user-greeting"></div>
                
                <div class="row mt-5">
                    <div class="col-md-4 mb-4">
                        <div class="card h-100 border-0 shadow-sm">
                            <div class="card-body text-center">
                                <i class="bi bi-star-fill text-warning fs-1"></i>
                                <h5 class="card-title mt-3">Rate Recipes</h5>
                                <p class="card-text text-muted">Help others discover the best recipes by rating them.</p>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4 mb-4">
                        <div class="card h-100 border-0 shadow-sm">
                            <div class="card-body text-center">
                                <i class="bi bi-search text-info fs-1"></i>
                                <h5 class="card-title mt-3">Smart Search</h5>
                                <p class="card-text text-muted">Find recipes by title, ingredient, or category.</p>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4 mb-4">
                        <div class="card h-100 border-0 shadow-sm">
                            <div class="card-body text-center">
                                <i class="bi bi-people text-success fs-1"></i>
                                <h5 class="card-title mt-3">Community</h5>
                                <p class="card-text text-muted">Connect with fellow food enthusiasts.</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/footer.js"></script>
    <script src="js/navbar.js"></script>
    <script src="js/home.js"></script>
</body>
</html>
